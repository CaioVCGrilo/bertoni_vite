<!--
PASSO 1: Google Analytics 4
----------------------------
1. Acesse: https://analytics.google.com
2. Crie uma conta
3. Adicione uma propriedade
4. Obtenha seu ID de medição (formato: G-XXXXXXXXXX)
5. Substitua "G-XXXXXXXXXX" abaixo pelo seu ID real
6. Copie todo o código abaixo e cole logo APÓS a tag <head> em:
   - /index.html
   - /src/pages/cardapio.html
   - /src/pages/sobre.html
   - /src/pages/links.html
-->

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XXXXXXXXXX');
</script>

<!-- ===================================================== -->

<!--
PASSO 2: Google Tag Manager (OPCIONAL - mais avançado)
-------------------------------------------------------
1. Acesse: https://tagmanager.google.com
2. Crie uma conta
3. Crie um contêiner (Web)
4. Obtenha seu ID (formato: GTM-XXXXXXX)
5. Substitua "GTM-XXXXXXX" abaixo
6. Adicione o código do HEAD logo após <head>
7. Adicione o código do BODY logo após <body>
-->

<!-- Google Tag Manager - HEAD -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
<!-- End Google Tag Manager -->

<!-- Google Tag Manager - BODY (adicionar logo após <body>) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
